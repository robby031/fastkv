name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  core:
    name: core / ${{ matrix.os }} / ${{ matrix.compiler }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:         [ubuntu-24.04, macos-14]
        compiler:   [gcc, clang]
        build_type: [Debug, Release]
        exclude:
          - os: macos-14
            compiler: gcc

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER=${{ matrix.compiler }} \
            -DFASTKV_BUILD_TESTS=ON \
            -DFASTKV_BUILD_BENCH=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --parallel 4

  asan:
    name: AddressSanitizer
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: sudo apt-get update -qq && sudo apt-get install -y cmake ninja-build
      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DFASTKV_ENABLE_ASAN=ON \
            -DFASTKV_BUILD_TESTS=ON
      - name: Build & Test
        run: cmake --build build --parallel && cd build && LSAN_OPTIONS="suppressions=${{ github.workspace }}/lsan.supp" ctest --output-on-failure

  tsan:
    name: ThreadSanitizer
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: sudo apt-get update -qq && sudo apt-get install -y cmake ninja-build
      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DFASTKV_ENABLE_TSAN=ON \
            -DFASTKV_BUILD_TESTS=ON
      - name: Build & Test
        run: cmake --build build --parallel && cd build && ctest --output-on-failure

  static-analysis:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: sudo apt-get update -qq && sudo apt-get install -y cmake ninja-build clang-tidy
      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DFASTKV_BUILD_TESTS=ON
      - name: Build (untuk generate compile_commands)
        run: cmake --build build --parallel
      - name: Run clang-tidy
        run: |
          find src -name '*.c' | xargs clang-tidy \
            -p build \
            --warnings-as-errors='*' \
            --checks='-clang-analyzer-security.insecureAPI.DeprecatedOrUnsafeBufferHandling,-clang-analyzer-valist.Uninitialized'

  binding-python:
    name: binding / python
    runs-on: ubuntu-24.04
    needs: core
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build python3-dev python3-pip

      - name: Build fastkv (Release)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc \
            -DFASTKV_BUILD_TESTS=OFF \
            -DFASTKV_BUILD_BENCH=OFF
          cmake --build build --parallel

      - name: Install Python deps
        run: pip3 install cffi setuptools pytest --break-system-packages

      - name: Build CFFI extension
        working-directory: bindings/python
        run: python3 fastkv_ffi_build.py 2>&1

      - name: Run Python tests
        working-directory: bindings/python
        run: python3 -m pytest tests/ -v

  binding-go:
    name: binding / go
    runs-on: ubuntu-24.04
    needs: core
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build fastkv (Release)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc \
            -DFASTKV_BUILD_TESTS=OFF \
            -DFASTKV_BUILD_BENCH=OFF
          cmake --build build --parallel

      - name: Run Go tests
        working-directory: bindings/golang
        run: go test -v -count=1 -timeout 120s

  binding-rust:
    name: binding / rust
    runs-on: ubuntu-24.04
    needs: core
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build fastkv (Release)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc \
            -DFASTKV_BUILD_TESTS=OFF \
            -DFASTKV_BUILD_BENCH=OFF
          cmake --build build --parallel

      - name: Run Rust tests
        working-directory: bindings/rust
        run: cargo test --verbose

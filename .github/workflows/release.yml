name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  build-artifacts:
    name: artifacts / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x86_64
            cc: gcc
          - os: ubuntu-24.04
            target: linux-aarch64
            cc: gcc
            cross: true
          - os: macos-14
            target: macos-arm64
            cc: clang

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build
          if [ "${{ matrix.cross }}" = "true" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Build Release (native)
        if: matrix.cross != true
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DFASTKV_BUILD_TESTS=OFF \
            -DFASTKV_BUILD_BENCH=OFF \
            -DCMAKE_INSTALL_PREFIX=dist
          cmake --build build --parallel
          cmake --install build

      - name: Build Release (cross aarch64)
        if: matrix.cross == true
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DFASTKV_BUILD_TESTS=OFF \
            -DFASTKV_BUILD_BENCH=OFF \
            -DCMAKE_INSTALL_PREFIX=dist
          cmake --build build --parallel
          cmake --install build

      - name: Package archive
        shell: bash
        run: |
          ARCHIVE="fastkv-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE}"
          cp -r dist/include "${ARCHIVE}/"
          cp -r dist/lib     "${ARCHIVE}/"
          cp LICENSE         "${ARCHIVE}/" 2>/dev/null || true
          tar -czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastkv-${{ matrix.target }}
          path: fastkv-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          retention-days: 1

  build-python-wheel:
    name: wheel / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake ninja-build python3-dev python3-pip

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Build fastkv
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DFASTKV_BUILD_TESTS=OFF \
            -DFASTKV_BUILD_BENCH=OFF
          cmake --build build --parallel

      - name: Install Python build tools
        run: pip3 install cffi setuptools wheel --break-system-packages

      - name: Build wheel
        working-directory: bindings/python
        run: |
          python3 fastkv_ffi_build.py
          python3 setup.py bdist_wheel

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: fastkv-wheel-${{ matrix.os }}
          path: bindings/python/dist/*.whl
          retention-days: 1

  tag-go-binding:
    name: tag go binding
    runs-on: ubuntu-24.04
    needs: [build-artifacts, build-python-wheel]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Go sub-module butuh tag dengan prefix path-nya sendiri supaya
      # `go get github.com/robby031/fastkv/bindings/golang@vX.Y.Z` bisa resolve.
      # Tag ini dibuat otomatis sinkron dengan root release tag.
      - name: Push bindings/golang tag
        run: |
          VERSION="${GITHUB_REF_NAME}"
          GO_TAG="bindings/golang/${VERSION}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # skip kalau tag sudah ada (idempotent)
          if git rev-parse "${GO_TAG}" >/dev/null 2>&1; then
            echo "Tag ${GO_TAG} already exists, skipping"
          else
            git tag "${GO_TAG}"
            git push origin "${GO_TAG}"
            echo "Created tag ${GO_TAG}"
          fi

  create-release:
    name: create release
    runs-on: ubuntu-24.04
    needs: [build-artifacts, build-python-wheel, tag-go-binding]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PREV=$(git tag --sort=-version:refname | grep "^v" | grep -v "^${VERSION}$" | head -1)
          echo "## Changes since ${PREV:-initial}" > CHANGELOG_FRAGMENT.md
          if [ -n "$PREV" ]; then
            git log "${PREV}..HEAD" --pretty=format:"- %s (%h)" >> CHANGELOG_FRAGMENT.md
          else
            git log --pretty=format:"- %s (%h)" >> CHANGELOG_FRAGMENT.md
          fi
          echo "" >> CHANGELOG_FRAGMENT.md
          echo "" >> CHANGELOG_FRAGMENT.md
          echo "## How to install" >> CHANGELOG_FRAGMENT.md
          echo "" >> CHANGELOG_FRAGMENT.md
          echo "**C/C++ — download binary archive:**" >> CHANGELOG_FRAGMENT.md
          echo '```' >> CHANGELOG_FRAGMENT.md
          echo "# Extract header + libfastkv.a then link:" >> CHANGELOG_FRAGMENT.md
          echo "# -I<path>/include  -L<path>/lib  -lfastkv  -lpthread  -lm" >> CHANGELOG_FRAGMENT.md
          echo '```' >> CHANGELOG_FRAGMENT.md
          echo "" >> CHANGELOG_FRAGMENT.md
          echo "**Python:**" >> CHANGELOG_FRAGMENT.md
          echo '```' >> CHANGELOG_FRAGMENT.md
          echo "pip install fastkv-${VERSION}-*.whl" >> CHANGELOG_FRAGMENT.md
          echo '```' >> CHANGELOG_FRAGMENT.md
          echo "" >> CHANGELOG_FRAGMENT.md
          echo "**Go** (membutuhkan fastkv C library ter-install, lihat README):" >> CHANGELOG_FRAGMENT.md
          echo '```' >> CHANGELOG_FRAGMENT.md
          echo "go get github.com/robby031/fastkv/bindings/golang@${VERSION}" >> CHANGELOG_FRAGMENT.md
          echo '```' >> CHANGELOG_FRAGMENT.md
          echo "" >> CHANGELOG_FRAGMENT.md
          echo "**Rust:**" >> CHANGELOG_FRAGMENT.md
          echo '```' >> CHANGELOG_FRAGMENT.md
          echo 'fastkv = { git = "https://github.com/robby031/fastkv/bindings/rust", tag = "'${VERSION}'" }' >> CHANGELOG_FRAGMENT.md
          echo '```' >> CHANGELOG_FRAGMENT.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FastKV ${{ github.ref_name }}
          body_path: CHANGELOG_FRAGMENT.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-assets/*.tar.gz
            release-assets/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
